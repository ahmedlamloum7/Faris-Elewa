<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FARIS ELEWA</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #e2e2e2 0%, #fdfdfd 100%);
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px); 
      }
      100% {
        transform: translateY(0px);
      }
    }

    .logo {
      width: 160px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite; 
    }

    h1 {
      font-size: 26px;
      margin-bottom: 25px;
      color: #000000;
    }

    .button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #282828;
      color: #fff;
      text-decoration: none;
      margin: 12px 0;
      padding: 16px 12px;
      border-radius: 10px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .button:hover,
    .button:active {
      background-color: #000000;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }


    .portfolio-btn {
      background-color: #0056b3; 
    }

    .portfolio-btn:hover {
      background-color: #003d82;
    }

    .tiktok-btn {
      background-color: #000000;
    }

    .tiktok-btn:hover {
      box-shadow: 3px 3px 0 #00f2fe, -3px -3px 0 #fe0979; 
      transform: translateY(-2px);
    }

    .icon {
      width: 30px;  
      height: 30px;
      margin-bottom: 8px;
    }

    @media (max-width: 500px) {
      .container {
        margin: 20px;
        width: calc(100% - 40px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="FARIS ELEWA Logo" class="logo">
    <h1>FARIS ELEWA</h1>

    <a href="portfolio.pdf" class="button portfolio-btn" target="_blank">
      <img src="portfolio.png" alt="Portfolio" class="icon">
      Portfolio (PDF)
    </a>

    <a href="https://www.instagram.com/fariselewa?igsh=MWNpNGdlYncxMGgzNQ==" class="button" target="_blank">
      <img src="Instagram.png" alt="Instagram" class="icon">
      Instagram 
    </a>

    <a href="YOUR_FACEBOOK_LINK_HERE" class="button" target="_blank">
      <img src="facebook.png" alt="Facebook" class="icon">
      Facebook Page
    </a>

    <a href="https://wa.me/201063666265" class="button" target="_blank">
      <img src="whatsapp.png" alt="WhatsApp" class="icon">
      WhatsApp  1
    </a>

    <a href="https://wa.me/201066256529" class="button" target="_blank">
      <img src="whatsapp.png" alt="WhatsApp" class="icon">
      WhatsApp  2
    </a>

   <!--  <a href="......." class="button tiktok-btn" target="_blank">
      <img src="tik-tok.png" alt="TikTok" class="icon">
      TikTok
    </a> -->
  </div>
</body>
</html>
